version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: formforge
      POSTGRES_USER: formforge
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - formforge-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - formforge-network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://formforge:password@postgres:5432/formforge
      REDIS_URL: redis://redis:6379
      SECRET_KEY: your-secret-key-change-in-production
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      BROWSER_HEADLESS: "true"
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/logs:/app/logs
    networks:
      - formforge-network
    restart: unless-stopped

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - formforge-network
    restart: unless-stopped

  # Celery Worker (Background Jobs)
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A backend.main worker --loglevel=info
    environment:
      DATABASE_URL: postgresql://formforge:password@postgres:5432/formforge
      REDIS_URL: redis://redis:6379
      SECRET_KEY: your-secret-key-change-in-production
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      BROWSER_HEADLESS: "true"
      LOG_LEVEL: INFO
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/logs:/app/logs
    networks:
      - formforge-network
    restart: unless-stopped

  # Celery Beat (Scheduler)
  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A backend.main beat --loglevel=info
    environment:
      DATABASE_URL: postgresql://formforge:password@postgres:5432/formforge
      REDIS_URL: redis://redis:6379
      SECRET_KEY: your-secret-key-change-in-production
    depends_on:
      - postgres
      - redis
    networks:
      - formforge-network
    restart: unless-stopped

  # MinIO (Object Storage)
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: formforge
      MINIO_ROOT_PASSWORD: formforge123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - formforge-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  formforge-network:
    driver: bridge
